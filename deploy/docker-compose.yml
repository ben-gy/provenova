# Provenova production stack for a single Oracle ARM VM.
#
#   1. cp .env.example .env   (then edit — see comments in .env.example)
#   2. docker compose up -d --build
#
# Caddy fronts the API and provisions TLS automatically for $QL_DOMAIN.
# All secrets come from ./.env — nothing sensitive is hardcoded here.
services:
  postgres:
    image: postgres:16
    env_file: [.env]
    environment:
      POSTGRES_USER: quantumledger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: quantumledger
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantumledger -d quantumledger"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file: [.env]
    environment:
      QL_DEPLOYMENT: selfhost
      QL_DATABASE_URL: postgresql+psycopg://quantumledger:${POSTGRES_PASSWORD}@postgres:5432/quantumledger
      QL_BASE_URL: https://${QL_DOMAIN}
      QL_SECRET_KEY: ${QL_SECRET_KEY}
      QL_ATTESTATION_KEY_B64: ${QL_ATTESTATION_KEY_B64}
      QL_PUBLIC_CARDS: ${QL_PUBLIC_CARDS:-true}
      QL_ADMIN_EMAIL: ${QL_ADMIN_EMAIL:-admin@quantumledger.local}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2", "--proxy-headers", "--forwarded-allow-ips", "*"]
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file: [.env]
    command: ["python", "-m", "app.worker"]
    environment:
      QL_DEPLOYMENT: selfhost
      QL_DATABASE_URL: postgresql+psycopg://quantumledger:${POSTGRES_PASSWORD}@postgres:5432/quantumledger
      QL_ATTESTATION_KEY_B64: ${QL_ATTESTATION_KEY_B64}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  proxy:
    image: caddy:2
    env_file: [.env]
    environment:
      QL_DOMAIN: ${QL_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
