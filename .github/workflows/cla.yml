name: cla

# CLA Assistant Lite: gates PRs on a signed Provenova CLA (see /CLA.md).
# SECURITY: this workflow runs on pull_request_target with a write-scoped
# token — never add a checkout of PR head code to this job.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        # The sign-comment string in this guard must stay byte-identical to
        # custom-pr-sign-comment below, or sign comments never trigger a run.
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: '.github/signatures/cla.json'
          path-to-document: 'https://github.com/ben-gy/provenova/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'ben-gy,*[bot]'
          custom-pr-sign-comment: 'I have read the CLA and I hereby sign the CLA'
          custom-notsigned-prcomment: >-
            Thanks for the contribution! Provenova dual-licenses the server
            (BUSL-1.1 + commercial) and converts each release to Apache-2.0 on
            a four-year schedule — both need contributors to grant relicensing
            rights, so we ask everyone to sign the
            [Provenova CLA](https://github.com/ben-gy/provenova/blob/main/CLA.md)
            once. Please read it, then reply to this PR with the exact sentence
            below.
          custom-allsigned-prcomment: 'All contributors have signed the CLA.'
          lock-pullrequest-aftermerge: true
