[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "quantumledger"
version = "0.1.0"
description = "Provenova open-source client: capture quantum runs + their calibration state, reproducibly."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Provenova" }]
dependencies = [
    "quantumledger-core",
    "typer>=0.12",
    "rich>=13",
    "httpx>=0.27",
    "qiskit>=1.0,<2",
]

[project.optional-dependencies]
aer = ["qiskit-aer>=0.14"]
qiskit_runtime = ["qiskit-ibm-runtime>=0.20"]
braket = ["amazon-braket-sdk>=1.70"]
azure = ["azure-quantum>=1.0"]
all = ["qiskit-aer>=0.14"]

[project.scripts]
ql = "quantumledger.cli.__main__:main"

[project.entry-points."quantumledger.connectors"]
simulator = "quantumledger.connectors.simulator:LocalSimulatorConnector"
qiskit_runtime = "quantumledger.connectors.qiskit_runtime:QiskitRuntimeConnector"
braket = "quantumledger.connectors.braket:BraketConnector"
azure_quantum = "quantumledger.connectors.azure_quantum:AzureQuantumConnector"
ionq = "quantumledger.connectors.ionq:IonQConnector"

[tool.setuptools.packages.find]
where = ["src"]
include = ["quantumledger*"]
