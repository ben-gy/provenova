[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "quantumledger-crawler"
version = "0.1.0"
description = "QuantumLedger public-QPU calibration crawler: fixture/live sources, vendor normalization, ToS-gated corpus ingestion, scheduling."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "QuantumLedger" }]
dependencies = [
    "quantumledger-core",
    "SQLAlchemy>=2.0,<2.1",
    "APScheduler>=3.10,<4",
    "jsonschema>=4.20",
]

[project.optional-dependencies]
# Live sources talk to real vendor APIs; kept optional so the fixture-driven
# default path (and the test suite) needs zero third-party SDKs or credentials.
live = [
    "requests>=2.31",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["quantumledger_crawler*"]
