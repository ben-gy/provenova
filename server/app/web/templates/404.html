{% extends "base.html" %}
{% block title %}Page not found — Provenova{% endblock %}

{% block content %}
<div class="mx-auto max-w-xl py-16 text-center">
  <p class="text-sm font-medium uppercase tracking-wide text-indigo-600">404</p>
  <h1 class="mt-2 text-3xl font-bold tracking-tight text-slate-900">Page not found</h1>
  <p class="mt-3 text-sm leading-relaxed text-slate-600">
    {{ detail or "The page you're looking for doesn't exist — it may have moved, or the link is stale." }}
  </p>
  <div class="mt-6 flex flex-wrap justify-center gap-3 text-sm">
    <a href="/" class="rounded-md bg-indigo-600 px-4 py-2 font-medium text-white hover:bg-indigo-700">Home</a>
    <a href="/docs" class="rounded-md border border-slate-300 bg-white px-4 py-2 font-medium text-slate-700 hover:bg-slate-50">Docs</a>
    <a href="/leaderboard" class="rounded-md border border-slate-300 bg-white px-4 py-2 font-medium text-slate-700 hover:bg-slate-50">Leaderboard</a>
  </div>
</div>
{% endblock %}
